specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Tibber
providerId: tibber
created: '2026-05-25'
modified: '2026-05-25'
reconciled: false
tags:
  - FinOps
  - Energy
  - FOCUS
  - Retail
description: >-
  FOCUS-aligned FinOps definition for Tibber. The billable surface is retail
  electricity (kWh) plus optional Pulse hardware; developer API access is
  zero-priced today, so the API metering layer is captured as observability
  rather than spend.
sources:
  - https://tibber.com/en
  - https://developer.tibber.com/
  - https://data-api.tibber.com/docs/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Tibber
serviceCategory: Energy & Utilities
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: market-dependent
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
  primaryUnit: kWh
  secondaryUnits:
    - device
    - month
focusColumns:
  ServiceName: Tibber Energy
  ServiceCategory: Energy & Utilities
  ProviderName: Tibber
  PublisherName: Tibber
  InvoiceIssuerName: Tibber
  PricingCategory: Usage-Based
  PricingUnit: kWh
  BillingCurrency: NOK|SEK|EUR
meters:
  - name: energy_consumed_kwh
    unit: kWh
    aggregation: sum
    dimensions: [home, priceArea, hour]
  - name: energy_exported_kwh
    unit: kWh
    aggregation: sum
    dimensions: [home, priceArea, hour]
  - name: spot_price
    unit: currency_per_kwh
    aggregation: avg
    dimensions: [priceArea, hour]
  - name: monthly_fee
    unit: currency
    aggregation: sum
    dimensions: [home, country]
apiObservability:
  graphql_requests:
    unit: request
    cost: 0
    purpose: capacity planning and abuse detection
  data_api_requests:
    unit: request
    cost: 0
    purpose: rate-limit dashboarding and partner SLO tracking
  pulse_live_measurements:
    unit: message
    cost: 0
    purpose: device health and WebSocket reliability metrics
