description: >-
  Tibber is a fully-digital Nordic and European retail electricity provider
  operating in Norway, Sweden, Germany, and the Netherlands. Founded in 2016 by
  Daniel Lindén and Edgeir Vårdal Aksnes, the company passes Nord Pool / EPEX
  hourly spot prices through to customers at cost and overlays software-driven
  optimisation for EV charging, heat pumps, and rooftop solar to shift load to
  cheap and clean grid hours. Tibber publishes two distinct developer APIs: the
  long-standing GraphQL endpoint at api.tibber.com/v1-beta/gql for customer,
  subscription, price, consumption, production, and real-time
  `liveMeasurement` data streamed from the Tibber Pulse; and the newer OAuth
  2.0 Data API at data-api.tibber.com that exposes normalised time series for
  third-party IoT devices (vehicles, chargers, thermostats / heat pumps,
  inverters, home batteries) linked through the Tibber mobile app.
