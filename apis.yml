  - aid: tibber:tibber-data-api
    name: Tibber Data API
    humanURL: https://data-api.tibber.com/docs/
    baseURL: https://data-api.tibber.com/v1
    tags:
      - Energy
      - REST
      - OAuth2
      - IoT
      - ElectricVehicle
      - HeatPump
      - SolarInverter
      - HomeBattery
    description: >-
      Tibber's modern REST API for third-party connected IoT devices. OAuth 2.0
      Authorization Code Flow with PKCE; scopes gate each device category
      (`data-api-vehicles-read`, `data-api-chargers-read`,
      `data-api-thermostats-read`, `data-api-inverters-read`,
      `data-api-energy-systems-read`). Endpoints list homes, list and inspect
      devices, and walk paginated immutable device history at quarter-hour,
      hour, day, or month resolution. Tibber Pulse live streaming, pricing, and
      proprietary optimisation logic are explicitly out of scope and remain on
      the legacy GraphQL API.
